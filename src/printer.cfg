[gcode_macro G29]
gcode:
  {% set t = params.T|default(0)|float %}
 
  {% if printer.idle_timeout.state == "Printing" %}
    {action_respond_info("This command cannot be used while printing")}
  {% elif printer.toolhead.homed_axes != "xyz" %}
    {action_respond_info("Please home XYZ first")}
  {% else %}
    SAVE_GCODE_STATE NAME=G29_state
    G90
    G1 Z20 F1000
    {% if t > 30.0 %}
      M190 S{t}
    {% endif %}
    BED_MESH_CALIBRATE
    {% if 'S' in params %}
      M140 S{params.S}
    {% endif %}
    G90
    G1 Z20 F1000
    G1 X-5 Y0 F6000
    RESTORE_GCODE_STATE NAME=G29_state MOVE=0
  {% endif %}
 
 
 
 
[gcode_macro PAUSE_PARK]
gcode:
  {% set default_x = printer.toolhead.axis_minimum.x + 20 %}
  {% set default_y = printer.toolhead.axis_minimum.y + 20 %}
 
  {% if 'save_variables' in printer %}
    {% set svv = printer.save_variables.variables %}
    {% if 'park_x' in svv %}
      {% set default_x = svv.park_x %}
    {% endif %}
    {% if 'park_y' in svv %}
      {% set default_y = svv.park_y %}
    {% endif %}
  {% endif %}
 
  {% set x = params.X|default(default_x)|float %}
  {% set y = params.Y|default(default_y)|float %}
  {% set z = params.Z|default(20)|float %}
  {% set r = params.R|default(3)|float %}
 
  {% if printer.pause_resume.is_paused %}
    {action_respond_info("Already paused")}
  {% elif printer.toolhead.homed_axes != "xyz" %}
    {action_respond_info("Please home XYZ first")}
  {% else %}
    PAUSE
    {% if r > 0.0 %}
      RETRACT D={r}
    {% endif %}
    G27 X{x} Y{y} Z{z}
  {% endif %}
 
 
 
  ######################################################################
# Filament Change
######################################################################
 
# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.
 
#[pause_resume]
 
#[gcode_macro PARK_MACRO]
#default_parameter_X: 0.0
#default_parameter_Y: -85
#default_parameter_Z: 30
#gcode:
 #       M117 Parking..
#        G91
#        G1 E-20 F1500
#        G1 Z{Z}
#        G90
#        G1 X{X} Y{Y} F3000
 
[gcode_macro PAUSE_MACRO]
gcode:
        M117 Pause activated
        PAUSE
        PARK_MACRO
        SET_IDLE_TIMEOUT TIMEOUT=999999
 
# Pause/Resume functionality with support of position capture and restore
[pause_resume]
recover_velocity: 40
 
 
 
[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=<M600_State>
    PAUSE
    SET_IDLE_TIMEOUT TIMEOUT=999999
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-30 F1000
    RESTORE_GCODE_STATE NAME=<M600_State>
 
    ###FILAMENT RUNOUT
 
[filament_switch_sensor FSensor]
pause_on_runout: True
runout_gcode:M600 
insert_gcode: M117 RunOut False
event_delay: 8.0
switch_pin: ^!PG11
 
 
######################################################################
# Beeper
######################################################################
 
# M300 : Play tone. Beeper support, as commonly found on usual LCD
# displays (i.e. RepRapDiscount 2004 Smart Controller, RepRapDiscount
# 12864 Full Graphic). This defines a custom I/O pin and a custom
# GCODE macro.  Usage:
#   M300 [P<ms>] [S<Hz>]
#   P is the tone duration, S the tone frequency.
# The frequency won't be pitch perfect.
 
#[output_pin BEEPER_pin]
#pin: ar37
#   Beeper pin. This parameter must be provided.
#   ar37 is the default RAMPS/MKS pin.
#pwm: True
#   A piezo beeper needs a PWM signal, a DC buzzer doesn't.
#value: 1
#   Silent at power on, set to 1 if active low.
#shutdown_value: 0
#   Disable at emergency shutdown (no PWM would be available anyway).
#cycle_time: 0.001
#   Default PWM frequency : 0.001 = 1ms will give a tone of 1kHz
#   Although not pitch perfect.
 
[gcode_macro M300]
gcode:
    # Use a default 1kHz tone if S is omitted.
    {% set S = params.S|default(1000)|int %}
    # Use a 10ms duration is P is omitted.
    {% set P = params.P|default(100)|int %}
    SET_PIN PIN=BEEPER_pin VALUE=0.5 CYCLE_TIME={ 1.0/S if S > 0 else 1 }
    G4 P{P}
    SET_PIN PIN=BEEPER_pin VALUE=0
 
 
    ######################################################################
# Start Print and End Print
######################################################################
 
# Replace the slicer's custom start and end g-code scripts with
# START_PRINT and END_PRINT.
 
[gcode_macro START_PRINT]
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
   {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
   Home
   #G28 ;HOME ALL
   M117 Waiting for temperature; Message
   M190 S{BED_TEMP}; Set temp to Cura Initial & wait; 
   M109 S{EXTRUDER_TEMP}; Set temp to Cura Initial & wait
   SET_GCODE_OFFSET Z=0.0
    #BED_MESH_PROFILE LOAD=<default>
    # Move the nozzle near the bed
    G90 #use absolute coordinates
    G1 Z5 F3000
    # Move the nozzle very close to the bed
    G1 Z0.70 F300
    #PURGE_LINE ## PRIMES NOZZLE EDGE OF BED
 
[gcode_macro PURGE_LINE]
gcode:
#PURGE
    G90
    G1 X10 Y0 F3000
    G1 Y125 E5 F3000
 
[gcode_macro END_PRINT]
gcode:
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Move nozzle away from print while retracting
    G91
    G1 X0 Y0 E-3 F300
    # Raise nozzle by 10mm
    G91
    G1 Z15 F3000
    G1 X-100 Y200
    # Disable steppers
    M84
 
 
[gcode_macro Home]
gcode:
    {% set ns = namespace(MUSTHOME= false) %}
    {% for AXIS in ["x", "y", "z"] %}
        {% if AXIS in printer.toolhead.homed_axes %}
            M117="{AXIS} is already homed"
        {% else %}
            M117="{AXIS} not homed"
            {% set ns.MUSTHOME = true %}
        {% endif %}
    {% endfor %}   
    {% if ns.MUSTHOME == true %}
        G28
        M117="homing"
    {% endif %}
 
 
