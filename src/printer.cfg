# This file contains common pin mappings for the BigTreeTech Octopus
# Pro v1.1 board.

# Important! Do not use this config with an Octopus Pro v1.0 board nor
# non-Pro board.

# To use this config, during "make menuconfig", select "Enable
# low-level configuration options", select the STM32H723
# micro-controller, select a "128KiB bootloader", and select a "25Mhz
# crystal".

# See docs/Config_Reference.md for a description of parameters.

# Driver0
[tmc2209 stepper_x]
uart_pin: PC4
#diag_pin: PG6
run_current: 0.800
stealthchop_threshold: 999999
endstop_pin:
position_endstop: -8
position_max: 400
position_min: -8


# Driver1
[tmc2209 stepper_y]
uart_pin: PD11
#diag_pin: PG9
run_current: 0.800
stealthchop_threshold: 999999
position_endstop: 0
position_max: 430
position_min: 0

# Driver2
[tmc2209 stepper_z]
uart_pin: PC6
#diag_pin: PG10
run_current: 0.650
stealthchop_threshold: 999999
position_endstop: 0
position_max: 450
position_min: -4.0

#Driver3
[tmc2209 stepper_z1]
uart_pin: PC7
#diag_pin: PG11
run_current: 0.650
stealthchop_threshold: 999999
position_endstop: 0
position_max: 450
position_min: -4.0

#Driver4
[tmc2209 extruder]
uart_pin: PF2
run_current: 0.800
stealthchop_threshold: 999999
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0 # HE0
sensor_pin:  PF4 # T0
sensor_type: NTC 100K MGB18-104F39050L32
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 250
pressure_advance: 0.2089
smooth_time: 1.0
min_extrude_temp: 190
max_extrude_only_distance: 800.0






#[filament_switch_sensor material_0]
#switch_pin: PG12


#[filament_switch_sensor material_1]
#switch_pin: PG13

# Driver6
#[extruder2]
#step_pin: PE2
#dir_pin: PE3
#enable_pin: !PD4
#heater_pin: PB0 # HE2
#sensor_pin: PF6 # T2
#...

#[filament_switch_sensor material_2]
#switch_pin: PG14

# Driver7
#[extruder3]
#step_pin: PE6
#dir_pin: PA14
#enable_pin: !PE0
#heater_pin: PB11 # HE3
#sensor_pin: PF7 # T3
#...

#[filament_switch_sensor material_3]
#switch_pin: PG15

[heater_bed]
heater_pin: PA1
sensor_pin: PF3 # TB
sensor_type: EPCOS 100K B57560G104F
control: watermark
max_delta: 2.0
min_temp: 0
max_temp: 130

[fan]
pin: PA8

[controller_fan_stepper_fan2] ###CONTROLLER FAN
stepper:
idle_timeout: 99999
pin: PA9

[heater_fan fan1]
pin: PE5
heater: tmc2209_extruder
heater_temp: 60.0


#[controller_fan_stepper_fan] ###CONTROLLER FAN
#pin: 
#stepper:
#idle_timeout: 99999


[mcu]
serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
# CAN bus is also available on this board

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100
minimum_cruise_ratio: 0.5
square_corner_velocity: 50.0


[bed_mesh]
speed: 100
horizontal_move_z: 10
mesh_min: 20, 20
mesh_max: 400, 400
probe_count: 5, 5

[safe_z_home]
home_xy_position: -8,0
speed: 50
z_hop: 10
z_hop_speed: 5

[pause_resume]
recover_velocity: 50

[firmware_retraction]
retract_length: 3
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed: 20
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed: 20
#   The speed of unretraction, in mm/s. The default is 10 mm/s.

[exclude_object]

